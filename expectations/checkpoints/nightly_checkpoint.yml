name: nightly_checkpoint
config_version: 1.0
class_name: SimpleCheckpoint
run_name_template: "%Y%m%d-%H%M%S-nightly"

validations:
  - batch_request:
      datasource_name: databricks_datasource
      data_connector_name: runtime_connector
      data_asset_name: silver_deliveries
    expectation_suite_name: deliveries_suite
    action_list:
      - name: store_validation_result
        action:
          class_name: StoreValidationResultAction
      - name: update_data_docs
        action:
          class_name: UpdateDataDocsAction
      - name: send_slack_notification
        action:
          class_name: SlackNotificationAction
          notify_on: failure          # only alert on failure
          slack_webhook: "{{ env_var('SLACK_WEBHOOK_URL', '') }}"