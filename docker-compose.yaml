# ============================================================
# Airflow + Databricks  —  Docker Compose
# ============================================================
# Services:
#   postgres        → Airflow metadata database
#   airflow-init    → One-time DB migration + admin user
#   airflow-webserver → Web UI on port 8080
#   airflow-scheduler → DAG scheduler
# ============================================================
# Usage:
#   docker compose up -d          → Start all services
#   docker compose down           → Stop all services
#   docker compose down -v        → Stop + delete data (fresh start)
#   docker compose logs -f        → Tail logs
# ============================================================
# FULL CLEAN RESTART SEQUENCE (if you want to reset everything):
# REM Step 1 — stop and remove everything including volumes
# docker compose down --volumes --remove-orphans

# REM Step 2 — remove old images
# docker rmi ipl-analytics-platform-airflow-webserver
# docker rmi ipl-analytics-platform-airflow-scheduler
# docker rmi ipl-analytics-platform-airflow-init

# REM Step 3 — rebuild from scratch
# docker compose build --no-cache

# REM Step 4 — run init
# docker compose up airflow-init

# REM Wait for "Airflow initialised successfully" message
# REM Then press Ctrl+C

# REM Step 5 — start all services
# docker compose up -d

# REM Step 6 — wait 30 seconds then check status
# docker compose ps
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: "ZjJjSEhRUUlXVEd0MkRNYjdGZkVhWEZPN19vN2l5VWs="
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    AIRFLOW__WEBSERVER__WARN_DEPLOYMENT_EXPOSURE: "False"
    # Pass secrets to containers (read from .env)
    DATABRICKS_HOST: ${DATABRICKS_HOST}
    AIRFLOW_DATABRICKS_TOKEN: ${AIRFLOW_DATABRICKS_TOKEN}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_REGION: ${AWS_REGION}
    CRICAPI_KEY: ${CRICAPI_KEY}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    - ./ingestion:/opt/airflow/ingestion
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  # ── PostgreSQL — Airflow metadata DB ─────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Airflow Init — DB migration + admin user ─────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Running Airflow DB migrations..."
        airflow db migrate
        echo "Creating admin user..."
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        echo "Airflow init complete!"
    restart: "no"

  # ── Airflow Webserver — UI on port 8080 ──────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler — runs DAGs on schedule ────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
