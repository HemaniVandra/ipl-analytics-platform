version: 2

models:
  - name: stg_deliveries
    description: >
      Staging model over Silver deliveries table.
      Casts all columns to correct types, adds derived fields
      like is_boundary, is_six, is_dot_ball, is_wicket and phase.
      Materialized as view — no storage cost.
    columns:
      - name: match_id
        description: "Unique match identifier"
        tests: [not_null]
      - name: over_number
        description: "Over number 0-19"
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 19"
      - name: runs_off_bat
        description: "Runs scored off the bat — excludes extras"
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: phase
        description: "Phase of play — powerplay, middle or death"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['powerplay', 'middle', 'death', 'super_over']

  - name: stg_matches
    description: >
      Staging model over Silver matches table.
      Adds derived fields like loser, toss_winner_won.
      Materialized as view — no storage cost.
    columns:
      - name: match_id
        description: "Unique match identifier"
        tests: [not_null, unique]
      - name: match_result
        description: "Match outcome"
        tests:
          - accepted_values:
              arguments:
                values: ['completed', 'tie', 'no_result', 'cancelled']
      - name: toss_decision
        description: "What toss winner chose — bat or field"
        tests:
          - accepted_values:
              arguments:
                values: ['bat', 'field']

  - name: stg_players
    description: >
      Staging model over Silver players SCD2 table.
      Filters to only currently active records (is_current = true).
      One row per player showing their current team.
    columns:
      - name: player_id
        description: "Unique Cricinfo player ID extracted from URL"
        tests: [not_null, unique]
      - name: player_name
        description: "Player name as scraped from Cricinfo"
        tests: [not_null]
      - name: team
        description: "Current team — standardised name"
        tests: [not_null]